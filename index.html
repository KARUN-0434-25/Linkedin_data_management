<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Network | Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
:root {
--bg-dark: #050608;
--accent: #00f2ff;
--accent-glow: rgba(0, 242, 255, 0.2);
--glass: rgba(15, 20, 25, 0.85);
--border: rgba(255, 255, 255, 0.08);
--text: #e0e6ed;
--sidebar-width: 280px;
}
* { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 10% 10%, #101a2b 0%, #050608 100%); z-index: -1; }
.app-layout { display: flex; width: 100%; }

.sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: var(--glass); backdrop-filter: blur(25px); border-right: 1px solid var(--border); z-index: 2000; overflow-y: auto; }
.sidebar-content { display: flex; flex-direction: column; height: 100%; padding: 30px 20px; }
.logo { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
.logo span { color: var(--accent); }
.stats-list { flex-grow: 1; margin-bottom: 20px; }
.stat-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); }

.mode-toggle-box { margin-bottom: 20px; padding-top: 15px; border-top: 1px solid var(--border); }
.toggle-container { background: #111; border: 1px solid var(--border); padding: 8px 12px; border-radius: 30px; display: flex; align-items: center; cursor: pointer; }
.mode-knob { width: 16px; height: 16px; background: #333; border-radius: 50%; margin-right: 10px; }
.recruiter-active .mode-knob { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); transform: translateX(4px); }

.sidebar-footer { padding-top: 15px; border-top: 1px solid var(--border); }
.btn-util { width: 100%; background: none; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-size: 11px; font-weight: 600; }
.primary-util { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); color: var(--accent); }

.main-content { flex: 1; margin-left: var(--sidebar-width); padding: 40px; }
.glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 30px; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
input { background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; font-size: 14px; }
.add-btn { background: var(--accent); color: #000; font-weight: 800; border: none; border-radius: 8px; cursor: pointer; }

.recruiter-active .hide-in-recruiter { display: none !important; }
.recruiter-active #form-section { opacity: 0; height: 0; overflow: hidden; }

.table-responsive { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 650px; }
th, td { padding: 15px; border-bottom: 1px solid var(--border); }
th { font-size: 11px; color: #667; text-transform: uppercase; }

.row-premium { border-left: 3px solid var(--accent); }

.toast-container { position: fixed; bottom: 20px; right: 20px; }
.toast { background: #111; color: var(--accent); padding: 12px 20px; border-radius: 8px; margin-top: 10px; }
</style>
</head>

<body>

<div class="bg-animate"></div>

<div class="app-layout">
<aside class="sidebar" id="sidebar">
<div class="sidebar-content">
<div class="logo">CORE<span>NET</span></div>

<div id="collegeStats" class="stats-list"></div>

<div class="mode-toggle-box">
<div class="toggle-container" onclick="toggleRecruiterMode()">
<div id="mode-knob" class="mode-knob"></div>
<span id="mode-label">STANDARD</span>
</div>
</div>

<div class="sidebar-footer">
<button class="btn-util primary-util" onclick="generatePDF()">Generate PDF</button>
<button class="btn-util" onclick="exportToFile()">Backup</button>
<button class="btn-util" onclick="document.getElementById('importFile').click()">Import</button>
<input type="file" id="importFile" hidden onchange="importFromFile(event)">
</div>
</div>
</aside>

<main class="main-content">
<h1 id="main-title">Network Manager</h1>
<p id="totalCount">0 Connections</p>

<section class="glass-card" id="form-section">
<input type="hidden" id="editId">
<div class="form-grid">
<input id="nameIn" placeholder="Name">
<input id="orgIn" placeholder="Organization">
<input id="qualIn" placeholder="Quality">
<input id="linkIn" placeholder="LinkedIn">
<button onclick="saveEntry()">Add</button>
</div>
</section>

<input id="searchBar" placeholder="Search..." onkeyup="runFilters()">

<table>
<thead>
<tr>
<th>Name</th>
<th>Org</th>
<th>Quality</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</main>
</div>

<div id="toast-container"></div>

<script>
let networkData = JSON.parse(localStorage.getItem('core_net_v7')) || [];
let recruiterMode = false;

window.onload = renderTable;

function showToast(msg){
const t=document.createElement('div');
t.className='toast';
t.innerText=msg;
document.getElementById('toast-container').appendChild(t);
setTimeout(()=>t.remove(),3000);
}

function renderTable(){
const tbody=document.getElementById('tableBody');
tbody.innerHTML='';
networkData.forEach(item=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${item.name}</td>
<td>${item.college}</td>
<td>${item.post}</td>
<td>${item.sent?'✓':''} ${item.made?'✓':''}</td>
<td>
<button onclick="deleteItem(${item.id})">X</button>
</td>`;
tbody.appendChild(tr);
});
document.getElementById('totalCount').innerText=networkData.length+" Connections";
}

function saveEntry(){
const name=nameIn.value;
const org=orgIn.value;
if(!name||!org)return;

networkData.push({
id:Date.now(),
name,
college:org,
post:qualIn.value||'A',
link:linkIn.value||'#',
sent:false,
made:false
});

localStorage.setItem('core_net_v7',JSON.stringify(networkData));
renderTable();
}

function deleteItem(id){
networkData=networkData.filter(x=>x.id!==id);
localStorage.setItem('core_net_v7',JSON.stringify(networkData));
renderTable();
}

function runFilters(){
const q=searchBar.value.toLowerCase();
document.querySelectorAll('tbody tr').forEach(tr=>{
tr.style.display=tr.innerText.toLowerCase().includes(q)?'':'none';
});
}

function toggleRecruiterMode(){
recruiterMode=!recruiterMode;
document.body.classList.toggle('recruiter-active');
}

function exportToFile(){
const blob=new Blob([JSON.stringify(networkData)]);
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='backup.json';
a.click();
}

function importFromFile(e){
const reader=new FileReader();
reader.onload=(ev)=>{
networkData=JSON.parse(ev.target.result);
localStorage.setItem('core_net_v7',JSON.stringify(networkData));
renderTable();
};
reader.readAsText(e.target.files[0]);
}

async function generatePDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.text("Network Report",10,10);
doc.save("report.pdf");
}
</script>

</body>
</html>
